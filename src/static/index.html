<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 50px;
        }

        .container {
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .result-box {
            margin-top: 20px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2 class="text-center mb-4">Phishing URL Detector</h2>

        <div class="mb-3">
            <label for="urlInput" class="form-label">Enter Website URL</label>
            <input type="url" class="form-control" id="urlInput" placeholder="http://example.com" required>
        </div>

        <button onclick="checkUrl()" class="btn btn-primary w-100">Analyze URL</button>

        <div id="result" class="alert result-box text-center"></div>
    </div>

    <script>
        async function checkUrl() {
            const url = document.getElementById('urlInput').value;
            const resultBox = document.getElementById('result');

            if (!url) {
                alert("Please enter a URL");
                return;
            }

            resultBox.style.display = 'none';
            resultBox.className = 'alert result-box text-center alert-info';
            resultBox.innerText = "Analyzing...";
            resultBox.style.display = 'block';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Error analyzing URL');
                }

                const data = await response.json();

                if (data.is_phishing) {
                    resultBox.className = 'alert result-box text-center alert-danger';
                    resultBox.innerHTML = `<strong>⚠️ PHISHING DETECTED!</strong><br>Confidence: ${(data.confidence * 100).toFixed(2)}%`;
                } else {
                    resultBox.className = 'alert result-box text-center alert-success';
                    resultBox.innerHTML = `<strong>✅ Legitimate Website</strong><br>Confidence: ${(data.confidence * 100).toFixed(2)}%`;
                }
            } catch (error) {
                resultBox.className = 'alert result-box text-center alert-warning';
                resultBox.innerText = error.message;
            }
        }
    </script>

</body>

</html>
