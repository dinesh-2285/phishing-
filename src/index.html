<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard — URL Threat Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: #e0e0e0;
        }

        .app {
            width: 100%;
            max-width: 520px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header .logo {
            font-size: 2.5rem;
            margin-bottom: 0.25rem;
        }
        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .header p {
            font-size: 0.9rem;
            color: #9ca3af;
            margin-top: 0.35rem;
        }

        /* Card */
        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        }

        /* Input Group */
        .input-group {
            position: relative;
            margin-bottom: 1rem;
        }
        .input-group .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            color: #6b7280;
            pointer-events: none;
        }
        .input-group input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.75rem;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-group input::placeholder { color: #6b7280; }
        .input-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 0.85rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(99, 102, 241, 0.45); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Result */
        .result {
            margin-top: 1.25rem;
            border-radius: 12px;
            padding: 1.25rem 1.25rem;
            display: none;
            animation: fadeUp 0.35s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .result .result-icon { font-size: 2rem; margin-bottom: 0.35rem; }
        .result .result-label { font-size: 1.1rem; font-weight: 600; }
        .result .result-confidence {
            font-size: 0.85rem;
            margin-top: 0.3rem;
            opacity: 0.85;
        }
        .result .result-url {
            font-size: 0.78rem;
            margin-top: 0.6rem;
            word-break: break-all;
            opacity: 0.6;
        }

        .result.safe {
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }
        .result.phishing {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        .result.error {
            background: rgba(234, 179, 8, 0.12);
            border: 1px solid rgba(234, 179, 8, 0.3);
            color: #fde68a;
        }

        /* Confidence bar */
        .confidence-bar-track {
            margin-top: 0.75rem;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .confidence-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s ease;
        }
        .result.safe .confidence-bar-fill { background: #22c55e; }
        .result.phishing .confidence-bar-fill { background: #ef4444; }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #6b7280;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card { padding: 1.5rem; }
            .header h1 { font-size: 1.4rem; }
        }
    </style>
</head>

<body>

<div class="app">
    <div class="header">
        <div class="logo">🛡️</div>
        <h1>PhishGuard</h1>
        <p>AI-powered phishing URL detection</p>
    </div>

    <div class="card">
        <div class="input-group">
            <span class="icon">🔗</span>
            <input
                type="text"
                id="urlInput"
                placeholder="Enter a URL to analyze…"
                autocomplete="off"
                spellcheck="false"
            />
        </div>

        <button class="btn" id="analyzeBtn" onclick="checkUrl()">
            <span class="spinner" id="spinner"></span>
            <span id="btnText">Analyze URL</span>
        </button>

        <div class="result" id="result">
            <div class="result-icon" id="resultIcon"></div>
            <div class="result-label" id="resultLabel"></div>
            <div class="result-confidence" id="resultConfidence"></div>
            <div class="confidence-bar-track" id="barTrack">
                <div class="confidence-bar-fill" id="barFill"></div>
            </div>
            <div class="result-url" id="resultUrl"></div>
        </div>
    </div>

    <div class="footer">
        PhishGuard &mdash; Powered by Machine Learning
    </div>
</div>

<script>
    const urlInput   = document.getElementById('urlInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const spinner    = document.getElementById('spinner');
    const btnText    = document.getElementById('btnText');
    const resultDiv  = document.getElementById('result');

    // Allow Enter key to trigger analysis
    urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkUrl(); });

    async function checkUrl() {
        const url = urlInput.value.trim();
        if (!url) { urlInput.focus(); return; }

        // UI: loading state
        resultDiv.style.display = 'none';
        analyzeBtn.disabled = true;
        spinner.style.display = 'inline-block';
        btnText.textContent = 'Analyzing…';

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.detail || 'Error analyzing URL');
            }

            const data = await response.json();
            const pct  = (data.confidence * 100).toFixed(1);

            if (data.is_phishing) {
                showResult('phishing', '⚠️', 'Phishing Detected', `${pct}% confidence this is malicious`, pct, data.url);
            } else {
                showResult('safe', '✅', 'Legitimate Website', `${pct}% confidence this is safe`, pct, data.url);
            }
        } catch (error) {
            showResult('error', '⚡', 'Analysis Failed', error.message, 0, url);
        } finally {
            analyzeBtn.disabled = false;
            spinner.style.display = 'none';
            btnText.textContent = 'Analyze URL';
        }
    }

    function showResult(type, icon, label, confidence, pct, url) {
        resultDiv.className = 'result ' + type;
        document.getElementById('resultIcon').textContent       = icon;
        document.getElementById('resultLabel').textContent      = label;
        document.getElementById('resultConfidence').textContent = confidence;
        document.getElementById('resultUrl').textContent        = url;

        const barTrack = document.getElementById('barTrack');
        const barFill  = document.getElementById('barFill');

        if (type === 'error') {
            barTrack.style.display = 'none';
        } else {
            barTrack.style.display = 'block';
            barFill.style.width = '0%';
            requestAnimationFrame(() => { barFill.style.width = pct + '%'; });
        }

        resultDiv.style.display = 'block';
    }
</script>

</body>
</html>
